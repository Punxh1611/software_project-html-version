<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANVAN — ยืนยันการจอง</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bacasime+Antique&family=IBM+Plex+Sans+Thai:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-main.css">
    <style>
        .booking-container { max-width:560px; margin:32px auto; padding:0 16px 48px; }
        .back-link { display:inline-flex; align-items:center; gap:6px; font-family:var(--font-thai); font-size:14px; color:var(--color-text-secondary); text-decoration:none; margin-bottom:20px; transition:color 0.2s; }
        .back-link:hover { color:var(--color-brand); }
        .booking-card { background:var(--color-white); border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); overflow:hidden; }
        .booking-card__header { background:var(--color-brand); padding:20px 24px; color:white; }
        .booking-card__header h2 { font-family:var(--font-thai); font-size:18px; font-weight:600; }
        .booking-card__header p { font-family:var(--font-thai); font-size:13px; opacity:0.8; margin-top:4px; }
        .booking-card__body { padding:24px; }
        .info-row { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--color-border); }
        .info-row:last-child { border-bottom:none; }
        .info-row__label { font-family:var(--font-thai); font-size:14px; color:var(--color-text-secondary); }
        .info-row__value { font-family:var(--font-thai); font-size:15px; font-weight:600; color:var(--color-black); text-align:right; }
        .info-row__value--price { font-size:20px; color:var(--color-brand); }
        .route-display { display:flex; align-items:center; gap:8px; font-family:var(--font-thai); font-size:15px; font-weight:600; }
        .seats-badge { display:inline-flex; align-items:center; background:#e8f5e9; color:#2e7d32; padding:4px 12px; border-radius:999px; font-family:var(--font-thai); font-size:14px; font-weight:600; }
        .seats-badge--low { background:#fff3e0; color:#e65100; }
        .seats-badge--full { background:#ffebee; color:#c62828; }
        .action-buttons { display:flex; gap:12px; padding:20px 24px; border-top:1px solid var(--color-border); background:var(--color-bg); }
        .btn-cancel { flex:1; padding:14px; border:1.5px solid var(--color-border); border-radius:var(--radius-btn); background:white; font-family:var(--font-thai); font-size:15px; font-weight:600; color:var(--color-text-secondary); cursor:pointer; transition:all 0.2s; }
        .btn-cancel:hover { border-color:#c62828; color:#c62828; }
        .btn-confirm { flex:2; padding:14px; border:none; border-radius:var(--radius-btn); background:var(--color-brand); font-family:var(--font-thai); font-size:15px; font-weight:700; color:white; cursor:pointer; transition:background 0.2s; }
        .btn-confirm:hover { background:#2a4860; }
        .btn-confirm:disabled { opacity:0.6; cursor:not-allowed; }
        .loading { text-align:center; padding:60px 24px; font-family:var(--font-thai); color:var(--color-text-secondary); }
        .loading-spinner { width:36px; height:36px; border:3px solid var(--color-border); border-top-color:var(--color-brand); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .error-box { text-align:center; padding:40px 24px; }
        .error-box__icon { font-size:48px; margin-bottom:12px; }
        .error-box__title { font-family:var(--font-thai); font-size:18px; font-weight:600; margin-bottom:8px; }
        .error-box__msg { font-family:var(--font-thai); font-size:14px; color:var(--color-text-secondary); }
        .btn-back { display:inline-block; margin-top:20px; padding:12px 24px; background:var(--color-brand); color:white; border-radius:var(--radius-btn); font-family:var(--font-thai); font-size:14px; font-weight:600; text-decoration:none; }
        .divider { height:1px; background:var(--color-border); margin:8px 0; }
    </style>
</head>
<body>

    <header class="navbar">
        <button class="navbar__hamburger" id="hamburger-btn" aria-label="เมนู">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M3 6h18M3 12h18M3 18h18" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
        </button>
        <span class="navbar__mobile-title">VANVAN</span>
        <div class="navbar__left"><div class="logo"><span class="van-text">VANVAN</span></div></div>
        <nav class="navbar__actions" id="nav-actions-desktop"></nav>
    </header>

    <nav class="nav-drawer" id="nav-drawer">
        <div class="drawer__header">
            <span class="drawer__logo">VANVAN</span>
            <button class="drawer__close" id="drawer-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="drawer__body"><div id="nav-drawer-links"></div></div>
    </nav>
    <div class="drawer-overlay" id="drawer-overlay"></div>

    <div class="booking-container">
        <a href="index.html" class="back-link">← กลับหน้าหลัก</a>

        <div class="booking-card">
            <div class="loading" id="loading-state">
                <div class="loading-spinner"></div>
                <p>กำลังโหลดข้อมูล...</p>
            </div>

            <div id="booking-content" style="display:none">
                <div class="booking-card__header">
                    <h2>ยืนยันการจอง</h2>
                    <p>กรุณาตรวจสอบข้อมูลก่อนดำเนินการต่อ</p>
                </div>
                <div class="booking-card__body">
                    <div class="info-row">
                        <span class="info-row__label">เส้นทาง</span>
                        <div class="route-display">
                            <span id="info-origin">-</span>
                            <span style="color:var(--color-brand);font-size:18px">→</span>
                            <span id="info-destination">-</span>
                        </div>
                    </div>
                    <div class="info-row">
                        <span class="info-row__label">วันเวลาออกรถ</span>
                        <span class="info-row__value" id="info-depart">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-row__label">คนขับ</span>
                        <span class="info-row__value" id="info-driver">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-row__label">ทะเบียนรถ</span>
                        <span class="info-row__value" id="info-plate">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-row__label">ที่นั่งว่าง</span>
                        <div id="info-seats"></div>
                    </div>
                    <div class="divider"></div>
                    <div class="info-row">
                        <span class="info-row__label">ผู้โดยสาร</span>
                        <span class="info-row__value" id="info-passenger">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-row__label">ราคา</span>
                        <span class="info-row__value info-row__value--price" id="info-price">-</span>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="btn-cancel" onclick="window.location.href='index.html'">ยกเลิก</button>
                    <button class="btn-confirm" id="btn-confirm">ดำเนินการชำระเงิน →</button>
                </div>
            </div>

            <div id="error-state" style="display:none">
                <div class="error-box">
                    <div class="error-box__icon">⚠️</div>
                    <div class="error-box__title" id="error-title">ไม่พบข้อมูลรอบนี้</div>
                    <div class="error-box__msg" id="error-msg">รอบที่เลือกอาจเต็มหรือไม่มีในระบบแล้ว</div>
                    <a href="index.html" class="btn-back">กลับหน้าหลัก</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="booking.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>

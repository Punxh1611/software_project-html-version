<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANVAN — ลืมรหัสผ่าน</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Strength bar แยกออกจาก field ── */
        .strength-wrapper {
            display: none;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
            padding: 0 2px;
        }
        .strength-wrapper.show { display: flex; }
        .strength-bar {
            flex: 1;
            height: 5px;
            background: #e0e8f0;
            border-radius: 3px;
            overflow: hidden;
        }
        .strength-bar__fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s, background 0.3s;
            width: 0%;
        }
        .strength-label {
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            white-space: nowrap;
            min-width: 64px;
            text-align: right;
        }

        /* ── Success card ── */
        .success-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #43a047, #66bb6a);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(67,160,71,0.3);
        }
        .success-icon svg {
            width: 36px;
            height: 36px;
        }
        .success-title {
            font-family: 'Alexandria', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--blue-dark);
            margin-bottom: 10px;
        }
        .success-msg {
            font-size: 14px;
            color: var(--text-soft);
            line-height: 1.7;
            margin-bottom: 24px;
        }
        .card--success {
            align-items: center;
            text-align: center;
        }

        /* ── Cancel link ── */
        .cancel-link {
            text-align: center;
            font-size: 14px;
            color: var(--text-soft);
            font-family: 'DM Sans', sans-serif;
            margin-top: 4px;
        }
        .cancel-link a {
            color: var(--blue-mid);
            text-decoration: none;
            font-weight: 500;
        }
        .cancel-link a:hover {
            color: var(--blue-dark);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="banner">
        <h1>VANVAN</h1>
        <p>Reset Password</p>
    </div>

    <div class="wrapper">

        <!-- Step 1: ยืนยัน Email -->
        <div class="card" id="card-verify">
            <div class="page-title">ลืมรหัสผ่าน?</div>
            <div class="page-subtitle">กรอก Email ที่ใช้ลงทะเบียน</div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="กรอก Email ที่ใช้ลงทะเบียน"
                       autocomplete="email">
            </div>

            <button class="btn-signin" id="btn-verify">ยืนยันตัวตน</button>

            <!-- Cancel -->
            <div class="cancel-link">
                จำรหัสผ่านได้แล้ว? <a href="login.html">กลับหน้า Login</a>
            </div>
        </div>

        <!-- Step 2: ตั้งรหัสใหม่ -->
        <div class="card" id="card-reset" style="display:none">
            <div class="card-title">ตั้งรหัสผ่านใหม่</div>

            <div class="field field--password">
                <label for="new-password">รหัสผ่านใหม่</label>
                <input type="password" id="new-password"
                       placeholder="อย่างน้อย 6 ตัวอักษร"
                       autocomplete="new-password">
                <button class="btn-eye" data-toggle="new-password" type="button"></button>
            </div>

            <!-- Strength bar อยู่นอก .field ไม่ทับ input -->
            <div class="strength-wrapper" id="strength-wrapper">
                <div class="strength-bar">
                    <div class="strength-bar__fill" id="strength-fill"></div>
                </div>
                <span class="strength-label" id="strength-label"></span>
            </div>

            <div class="field field--password">
                <label for="confirm-password">ยืนยันรหัสผ่าน</label>
                <input type="password" id="confirm-password"
                       placeholder="กรอกรหัสผ่านอีกครั้ง"
                       autocomplete="new-password">
                <button class="btn-eye" data-toggle="confirm-password" type="button"></button>
            </div>

            <button class="btn-signin" id="btn-reset">บันทึกรหัสผ่านใหม่</button>

            <div class="cancel-link">
                เปลี่ยนใจแล้ว? <a href="login.html">กลับหน้า Login</a>
            </div>
        </div>

        <!-- Step 3: สำเร็จ -->
        <div class="card card--success" id="card-success" style="display:none">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <div class="success-title">เปลี่ยนรหัสผ่านสำเร็จ!</div>
            <div class="success-msg">
                รหัสผ่านใหม่ของคุณถูกบันทึกแล้ว<br>
                สามารถเข้าสู่ระบบได้เลย
            </div>
            <a class="btn-signin" href="login.html"
               style="text-decoration:none;display:block;text-align:center;padding:14px">
                เข้าสู่ระบบ
            </a>
        </div>

        <div class="register-row">
            Don't have an account? <a class="link" href="register.html">Register here</a>
        </div>
    </div>

    <script type="module">
        import { toast } from "./Toast.js";

        const API = "http://localhost:3000/api";
        let userId = null;

        // ── Eye Toggle ────────────────────────────────────
        const EYE_ON  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        const EYE_OFF = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

        document.querySelectorAll(".btn-eye[data-toggle]").forEach(btn => {
            btn.innerHTML = EYE_ON;
            btn.addEventListener("click", () => {
                const input   = document.getElementById(btn.dataset.toggle);
                const show    = input.type === "password";
                input.type    = show ? "text" : "password";
                btn.innerHTML = show ? EYE_OFF : EYE_ON;
                input.focus();
            });
        });

        // ── Shake card ────────────────────────────────────
        function shake(cardId) {
            const card = document.getElementById(cardId);
            card.classList.remove("card--shake");
            void card.offsetWidth;
            card.classList.add("card--shake");
            card.addEventListener("animationend", () => card.classList.remove("card--shake"), { once: true });
        }

        // ── Field error ───────────────────────────────────
        function setError(id, msg) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.add("input--error");
            el.parentElement.querySelector(".field-error-msg")?.remove();
            const span = document.createElement("span");
            span.className   = "field-error-msg";
            span.textContent = msg;
            el.parentElement.appendChild(span);
        }
        function clearError(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove("input--error", "input--success");
            el.parentElement.querySelector(".field-error-msg")?.remove();
        }

        // Clear on input
        ["email","new-password","confirm-password"].forEach(id => {
            document.getElementById(id)?.addEventListener("input", () => clearError(id));
        });

        // ── Strength Bar ──────────────────────────────────
        document.getElementById("new-password")?.addEventListener("input", e => {
            const val     = e.target.value;
            const wrapper = document.getElementById("strength-wrapper");
            const fill    = document.getElementById("strength-fill");
            const label   = document.getElementById("strength-label");

            if (!val) { wrapper.classList.remove("show"); return; }
            wrapper.classList.add("show");

            const score = [
                val.length >= 6,
                val.length >= 10,
                /[A-Z]/.test(val) && /[0-9]/.test(val),
                /[^A-Za-z0-9]/.test(val),
            ].filter(Boolean).length;

            const lv = [null,
                { p:"25%",  c:"#e53935", t:"อ่อนมาก" },
                { p:"50%",  c:"#fb8c00", t:"พอใช้" },
                { p:"75%",  c:"#fdd835", t:"ดี" },
                { p:"100%", c:"#43a047", t:"แข็งแกร่ง" },
            ][Math.max(1, score)];

            fill.style.cssText = `width:${lv.p}; background:${lv.c}`;
            label.textContent  = lv.t;
            label.style.color  = lv.c;
        });

        // ── Step 1: ยืนยัน Email ──────────────────────────
        document.getElementById("btn-verify").addEventListener("click", async () => {
            const email = document.getElementById("email").value.trim();

            let valid = true;
            if (!email) { setError("email", "⚠ กรุณากรอก Email"); valid = false; }
            else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError("email", "⚠ รูปแบบ Email ไม่ถูกต้อง"); valid = false; }
            if (!valid) { shake("card-verify"); toast("กรุณากรอกข้อมูลให้ครบ", "warning"); return; }

            const btn = document.getElementById("btn-verify");
            btn.disabled    = true;
            btn.textContent = "กำลังตรวจสอบ...";

            try {
                const res  = await fetch(`${API}/auth/forgot-password`, {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({ email })
                });
                const data = await res.json();

                if (!res.ok) {
                    setError("email", "⚠ " + data.message);
                    toast(data.message, "warning");
                    shake("card-verify");
                    btn.disabled    = false;
                    btn.textContent = "ยืนยันตัวตน";
                    return;
                }

                userId = data.user_id;
                toast("พบบัญชีแล้ว! กรุณาตั้งรหัสผ่านใหม่", "success");
                document.getElementById("card-verify").style.display = "none";
                document.getElementById("card-reset").style.display  = "flex";

            } catch {
                toast("ไม่สามารถเชื่อมต่อ Server ได้", "error");
                btn.disabled    = false;
                btn.textContent = "ยืนยันตัวตน";
            }
        });

        document.getElementById("email")?.addEventListener("keydown", e => {
            if (e.key === "Enter") document.getElementById("btn-verify").click();
        });

        // ── Step 2: ตั้งรหัสใหม่ ──────────────────────────
        document.getElementById("btn-reset").addEventListener("click", async () => {
            const newPw = document.getElementById("new-password").value;
            const conPw = document.getElementById("confirm-password").value;

            // Validation
            let valid = true;
            if (!newPw)          { setError("new-password",     "⚠ กรุณากรอกรหัสผ่านใหม่"); valid = false; }
            else if (newPw.length < 6) { setError("new-password", "⚠ รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร"); valid = false; }
            if (!conPw)          { setError("confirm-password", "⚠ กรุณายืนยันรหัสผ่าน"); valid = false; }
            else if (newPw !== conPw && conPw) { setError("confirm-password", "⚠ รหัสผ่านไม่ตรงกัน"); valid = false; }
            if (!valid) { shake("card-reset"); toast("กรุณากรอกข้อมูลให้ถูกต้อง", "warning"); return; }

            const btn = document.getElementById("btn-reset");
            btn.disabled    = true;
            btn.textContent = "กำลังบันทึก...";

            try {
                const res  = await fetch(`${API}/auth/reset-password`, {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({ user_id: userId, new_password: newPw })
                });
                const data = await res.json();

                if (!res.ok) {
                    toast(data.message, "warning");
                    shake("card-reset");
                    btn.disabled    = false;
                    btn.textContent = "บันทึกรหัสผ่านใหม่";
                    return;
                }

                document.getElementById("card-reset").style.display   = "none";
                document.getElementById("card-success").style.display = "block";

            } catch {
                toast("ไม่สามารถเชื่อมต่อ Server ได้", "error");
                btn.disabled    = false;
                btn.textContent = "บันทึกรหัสผ่านใหม่";
            }
        });
    </script>

</body>
</html>

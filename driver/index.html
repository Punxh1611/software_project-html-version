<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Van Driver App</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="mobile-container">
      <!-- Header -->
      <header id="main-header">
        <div class="header-left">
          <button id="back-btn" class="back-btn">
            <i data-lucide="arrow-left"></i>
          </button>
          <h1 id="header-title">หน้าแรก</h1>
        </div>
        <button class="notification-btn">
          <i data-lucide="bell"></i>
          <span class="badge">2</span>
        </button>
      </header>

      <!-- Main Content -->
      <main id="main-content">
        <!-- Home Page -->
        <div id="home-page" class="page active">
          <div class="welcome-section">
            <div class="avatar">W</div>
            <div class="welcome-text">
              <p>สวัสดีตอนเช้า,</p>
              <h2>คุณวิชัย (คนขับ)</h2>
            </div>
          </div>
          <div id="next-trip-container"></div>
          <div class="stats-grid">
            <div class="card stat-card dark" style="margin-bottom:0">
              <p>งานวันนี้</p>
              <p>2 เที่ยว</p>
            </div>
            <div class="card stat-card" style="margin-bottom:0">
              <p>ผู้โดยสารรวม</p>
              <p>12 คน</p>
            </div>
          </div>
        </div>

        <!-- Schedule Page -->
        <div id="schedule-page" class="page">
          <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">ตารางวิ่งวันนี้</h2>
          <div id="schedule-list"></div>
        </div>

        <!-- Scan Page -->
        <div id="scan-page" class="page">
          <div class="scan-container">
            <!-- Camera viewfinder -->
            <div class="scan-frame" id="scan-frame-box">
              <video id="camera-video" autoplay playsinline muted></video>
              <canvas id="camera-canvas" style="display:none;"></canvas>
              <!-- Corner brackets -->
              <div class="corner tl"></div>
              <div class="corner tr"></div>
              <div class="corner bl"></div>
              <div class="corner br"></div>
              <div class="scan-line" id="scan-line-anim"></div>
            </div>

            <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">สแกน QR Code</h2>
            <p id="scan-status-text" style="font-size:14px;opacity:0.6;margin-bottom:24px;">เปิดกล้องเพื่อสแกนตั๋วผู้โดยสาร</p>

            <!-- Result card (hidden until scan) -->
            <div id="scan-result-card" style="display:none;width:100%;max-width:320px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:16px;padding:16px;margin-bottom:20px;text-align:left;">
              <p style="font-size:10px;opacity:0.6;text-transform:uppercase;margin-bottom:8px;">ผลการสแกน</p>
              <p id="scan-result-name" style="font-size:16px;font-weight:700;"></p>
              <p id="scan-result-ticket" style="font-size:12px;opacity:0.6;margin-top:2px;"></p>
              <p id="scan-result-status" style="font-size:12px;font-weight:700;margin-top:8px;"></p>
            </div>

            <div style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:280px;">
              <button class="btn-primary" style="width:100%;" id="start-camera-btn">
                <i data-lucide="camera" style="width:18px;height:18px;"></i> เปิดกล้อง
              </button>
              <button class="btn-secondary" style="width:100%;color:white;" id="cancel-scan-btn">ยกเลิก</button>
            </div>
          </div>
        </div>

        <!-- Profile Page -->
        <div id="profile-page" class="page">
          <div class="card" style="display:flex;flex-direction:column;align-items:center;padding:32px 20px;">
            <div class="avatar" style="width:96px;height:96px;font-size:36px;margin-bottom:16px;">W</div>
            <h2 style="font-size:20px;font-weight:700;">คุณวิชัย รักงาน</h2>
            <p style="color:var(--color-text-soft);font-size:14px;margin-bottom:24px;">พนักงานขับรถ (ID: DRV-882)</p>
            <div style="display:flex;gap:12px;width:100%;">
              <div style="flex:1;background-color:var(--color-bg-main);padding:12px;border-radius:16px;text-align:center;">
                <p style="font-size:10px;font-weight:700;color:var(--color-text-soft);text-transform:uppercase;">คะแนน</p>
                <p style="font-size:18px;font-weight:700;color:var(--color-blue-dark);">4.9/5.0</p>
              </div>
              <div style="flex:1;background-color:var(--color-bg-main);padding:12px;border-radius:16px;text-align:center;">
                <p style="font-size:10px;font-weight:700;color:var(--color-text-soft);text-transform:uppercase;">อายุงาน</p>
                <p style="font-size:18px;font-weight:700;color:var(--color-blue-dark);">2 ปี</p>
              </div>
            </div>
          </div>
          <div class="profile-menu-item">
            <div class="profile-menu-left">
              <i data-lucide="truck" style="color:var(--color-blue-mid);"></i>
              <span style="font-weight:500;">ข้อมูลรถตู้</span>
            </div>
            <i data-lucide="chevron-right" style="color:var(--color-text-soft);"></i>
          </div>
          <div class="profile-menu-item">
            <div class="profile-menu-left">
              <i data-lucide="calendar" style="color:var(--color-blue-mid);"></i>
              <span style="font-weight:500;">ประวัติการวิ่ง</span>
            </div>
            <i data-lucide="chevron-right" style="color:var(--color-text-soft);"></i>
          </div>
          <button style="width:100%;padding:20px;color:#ff4444;font-weight:700;background:none;border:none;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;">
            <i data-lucide="log-out"></i> ออกจากระบบ
          </button>
        </div>
      </main>

      <!-- Detail View -->
      <div id="detail-view">
        <div id="detail-header">
          <button id="detail-back-btn" style="background:none;border:none;cursor:pointer;color:var(--color-blue-dark);">
            <i data-lucide="arrow-left"></i>
          </button>
          <h2>รายละเอียดเที่ยว</h2>
        </div>
        <div id="detail-content"></div>
        <div class="detail-footer">
          <button class="btn-secondary" style="flex:1;"><i data-lucide="users" style="width:18px;height:18px;"></i> ติดต่อแอดมิน</button>
          <button class="btn-primary" style="flex:1;"><i data-lucide="map-pin" style="width:18px;height:18px;"></i> เริ่มนำทาง</button>
        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <button class="nav-item active" data-tab="home">
          <i data-lucide="truck"></i>
          <span>หน้าแรก</span>
        </button>
        <button class="nav-item" data-tab="schedule">
          <i data-lucide="calendar"></i>
          <span>ตารางวิ่ง</span>
        </button>
        <button class="nav-item" data-tab="scan">
          <i data-lucide="qr-code"></i>
          <span>สแกนตั๋ว</span>
        </button>
        <button class="nav-item" data-tab="profile">
          <i data-lucide="user"></i>
          <span>โปรไฟล์</span>
        </button>
      </nav>
    </div>
    <script src="script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="../auth-guard.js" data-role="driver"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Van Driver App</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="mobile-container">

      <!-- Header -->
      <header id="main-header">
        <div class="header-left">
          <button id="back-btn" class="back-btn">
            <i data-lucide="arrow-left"></i>
          </button>
          <h1 id="header-title">หน้าแรก</h1>
        </div>
        <button class="notification-btn" id="notification-btn">
          <i data-lucide="bell"></i>
          <span class="badge" id="notification-badge" style="display:none">0</span>
        </button>
      </header>

      <!-- Notification Panel -->
      <div id="notification-panel">
        <div class="notif-header">
          <span>การแจ้งเตือน</span>
          <button id="notif-clear-btn">ล้างทั้งหมด</button>
        </div>
        <div id="notif-list">
          <div class="notif-empty">ยังไม่มีการแจ้งเตือน</div>
        </div>
      </div>
      <div id="notif-overlay"></div>

      <!-- Main Content -->
      <main id="main-content">

        <!-- Home Page -->
        <div id="home-page" class="page active">
          <div class="welcome-section">
            <div class="avatar" id="profile-avatar">?</div>
            <div class="welcome-text">
              <p>Hello,</p>
              <h2 id="profile-name">กำลังโหลด...</h2>
            </div>
          </div>
          <div id="next-trip-container"></div>
          <div class="stats-grid">
            <div class="card stat-card dark" style="margin-bottom:0">
              <p>งานวันนี้</p>
              <p id="stat-today-trips">-</p>
            </div>
            <div class="card stat-card" style="margin-bottom:0">
              <p>ผู้โดยสารวันนี้</p>
              <p id="stat-total-passengers">-</p>
            </div>
          </div>
        </div>

        <!-- Schedule/History Page -->
        <div id="schedule-page" class="page">
          <div id="schedule-list"></div>
        </div>

        <!-- Scan Page -->
        <div id="scan-page" class="page">
          <div class="scan-container">
            <div class="scan-frame">
              <div class="scan-overlay"></div>
              <div class="scan-line"></div>
              <i data-lucide="qr-code" style="width:120px;height:120px;opacity:0.2;position:absolute;inset:0;margin:auto;"></i>
            </div>
            <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">สแกน QR Code</h2>
            <p style="font-size:14px;opacity:0.6;margin-bottom:32px;">วางตั๋วผู้โดยสารให้ตรงกับกรอบเพื่อตรวจสอบ</p>
            <button class="btn-primary" style="width:100%;max-width:280px;" id="simulate-scan-btn">จำลองการสแกนสำเร็จ</button>
            <button class="btn-secondary" style="margin-top:16px;width:100%;max-width:280px;" id="cancel-scan-btn">ยกเลิก</button>
          </div>
        </div>

        <!-- Profile Page -->
        <div id="profile-page" class="page">
          <div class="card profile-card">
            <div class="avatar profile-avatar-big" id="profile-avatar-big">?</div>
            <h2 class="profile-fullname" id="profile-fullname">กำลังโหลด...</h2>
            <p class="profile-email" id="profile-email">-</p>
            <p class="profile-license" id="profile-license">ใบขับขี่: -</p>
            <div class="profile-stats">
              <div class="profile-stat-box">
                <p class="profile-stat-label">เบอร์โทร</p>
                <p class="profile-stat-value" id="profile-phone">-</p>
              </div>
              <div class="profile-stat-box">
                <p class="profile-stat-label">งานที่สำเร็จทั้งหมด</p>
                <p class="profile-stat-value" id="profile-total-trips">-</p>
              </div>
            </div>
          </div>

          <button id="btn-logout" class="btn-logout-profile">
            <i data-lucide="log-out"></i>
            <span>ออกจากระบบ</span>
          </button>
        </div>

      </main>

      <!-- Detail View -->
      <div id="detail-view">
        <div id="detail-header">
          <button id="detail-back-btn" style="background:none;border:none;cursor:pointer;color:var(--color-blue-dark);">
            <i data-lucide="arrow-left"></i>
          </button>
          <h2>รายละเอียดเที่ยว</h2>
        </div>
        <div id="detail-content"></div>
        <div class="detail-footer">
          <button class="btn-secondary" style="flex:1;"><i data-lucide="users" style="width:18px;height:18px;"></i> ติดต่อแอดมิน</button>
          <button class="btn-primary" style="flex:1;"><i data-lucide="map-pin" style="width:18px;height:18px;"></i> เริ่มนำทาง</button>
        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <button class="nav-item active" data-tab="home">
          <i data-lucide="truck"></i>
          <span>หน้าแรก</span>
        </button>
        <button class="nav-item" data-tab="schedule">
          <i data-lucide="history"></i>
          <span>ประวัติ</span>
        </button>
        <button class="nav-item" data-tab="scan">
          <i data-lucide="qr-code"></i>
          <span>สแกนตั๋ว</span>
        </button>
        <button class="nav-item" data-tab="profile">
          <i data-lucide="user"></i>
          <span>โปรไฟล์</span>
        </button>
      </nav>
    </div>
    <script src="script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="auth-guard.js" data-role="guest"></script>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANVAN — Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="banner">
        <h1>VANVAN</h1>
        <p>Welcome to VANVAN</p>
    </div>

    <div class="wrapper">
        <div class="card" id="register-card">
            <div class="card-title">Create your account</div>

            <!-- Username -->
            <div class="field">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username"
                       placeholder="เช่น somchai123"
                       autocomplete="username"
                       autocapitalize="none"
                       spellcheck="false">
            </div>

            <!-- Email -->
            <div class="field">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email"
                       placeholder="example@email.com"
                       autocomplete="email">
            </div>

            <!-- Password -->
            <div class="field field--password">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password"
                       placeholder="อย่างน้อย 6 ตัวอักษร"
                       autocomplete="new-password">
                <button class="btn-eye" data-toggle="reg-password"
                        type="button" aria-label="แสดง/ซ่อนรหัสผ่าน"></button>
            </div>

            <!-- ✅ Strength bar อยู่ใต้ password field -->
            <div class="strength-bar-wrapper" id="strength-wrapper" style="display:none">
                <div class="strength-bar">
                    <div class="strength-bar__fill" id="strength-fill"></div>
                </div>
                <span class="strength-label" id="strength-label"></span>
            </div>

            <!-- Confirm Password -->
            <div class="field field--password">
                <label for="reg-confirm-password">Confirm Password</label>
                <input type="password" id="reg-confirm-password"
                       placeholder="กรอกรหัสผ่านอีกครั้ง"
                       autocomplete="new-password">
                <button class="btn-eye" data-toggle="reg-confirm-password"
                        type="button" aria-label="แสดง/ซ่อนรหัสผ่าน"></button>
            </div>

            <button class="btn-signin" id="btn-register">Register</button>
        </div>

        <div class="register-row">
            Already have an account? <a class="link" href="login.html">Sign in</a>
        </div>
    </div>

    <!-- ✅ โหลด script ด้านล่าง body เพื่อให้ DOM พร้อมก่อน -->
    <script type="module" src="register.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANVAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="register.js" type="module"></script>
    <style>
        .field--password { position: relative; }
        .field--password input { padding-right: 44px; }
        .btn-eye {
            position: absolute; right: 12px; bottom: 13px;
            background: none; border: none; cursor: pointer;
            color: #b0c4d8; padding: 0; display: flex;
            align-items: center; line-height: 0; transition: color 0.2s;
        }
        .btn-eye:hover { color: #2E86C1; }
    </style>
</head>
<body>
    <div class="banner">
        <h1>VANVAN</h1>
        <p>Welcome to VANVAN</p>
    </div>

    <div class="wrapper">
        <div class="card">
            <div class="card-title">Create your account</div>

            <div class="field">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" placeholder="Enter your username">
            </div>

            <div class="field">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="Enter your Email">
            </div>

            <div class="field field--password">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Enter your password">
                <button class="btn-eye" data-toggle="reg-password" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>

            <div class="field field--password">
                <label>Confirm Password</label>
                <input type="password" id="reg-confirm-password" placeholder="Confirm your password">
                <button class="btn-eye" data-toggle="reg-confirm-password" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>

            <button class="btn-signin" id="btn-register">Register</button>
        </div>

        <div class="register-row">
            Already have an account? <a class="link" href="login.html">Sign in</a>
        </div>
    </div>

    <script>
        const eyeOn  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        const eyeOff = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
        document.querySelectorAll(".btn-eye").forEach(btn => {
            btn.addEventListener("click", () => {
                const input = document.getElementById(btn.dataset.toggle);
                const show  = input.type === "password";
                input.type  = show ? "text" : "password";
                btn.innerHTML = show ? eyeOff : eyeOn;
            });
        });
    </script>
</body>
</html>

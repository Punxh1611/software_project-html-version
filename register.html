<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="register.js" type="module"></script>
    <title>VANVAN</title>
</head>

<body>
    <div class="banner">
        <h1>VANVAN</h1>
        <p>Welcome to VANVAN</p>
    </div>
    <div class="wrapper">
        <div class="card">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="reg-username" placeholder="Enter your username">
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="reg-email" placeholder="Enter your Email">
            </div>

            <div class="field field--password">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Enter your password">
                <button class="btn-eye" data-toggle-password="reg-password"></button>
            </div>

            <div class="field field--password">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="reg-confirm-password" placeholder="Confirm your password">
                <button class="btn-eye" data-toggle-password="reg-confirm-password"></button>
            </div>
        </div>

        <button class="btn-signin" id="btn-register">Register</button>

    </div>
    </div>
</body>

</html>

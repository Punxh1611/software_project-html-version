<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>VANVAN</title>
</head>
<body>
    <div class="banner">
        <h1>VANVAN</h1>
        <p>Welcome to VANVAN</p>
    </div>
    <div class="wrapper">
        <div class="card">
            <div class="card-title">Sign in to your account</div>

            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="text" id="username" placeholder="Enter your Email">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <div class="field">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="password" placeholder="Confirm your password">
            </div>

            <button class="btn-signin">Register</button>
            </div>
    </div>
</body>
</html>

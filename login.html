<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANVAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" type="module"></script>
</head>
<body>

    <div class="banner">
        <h1>VANVAN</h1>
        <p>Welcome back</p>
    </div>

    <div class="wrapper">
        <div class="card">
            <div class="card-title">Sign in to your account</div>

            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <button class="btn-signin">Sign In</button>

            <div class="card-footer">
                <a class="link" href="forgot_password.html">Forgot password?</a>
            </div>
        </div>

        <div class="register-row">
            Don't have an account? <a class="link" href="register.html">Register here</a>
        </div>
    </div>

</body>
</html>
